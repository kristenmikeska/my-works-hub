<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>World Not Found — Katarina Grande</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
  <style>
    .notfound {
      min-height: calc(100vh - var(--nav-h));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px clamp(18px, 4vw, 52px);
      text-align: center;
    }
    .notfound-inner {
      max-width: 480px;
    }
    .notfound-code {
      font-size: clamp(4rem, 14vw, 8rem);
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--hot) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 4px;
    }
    .notfound-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 28px;
    }
    .notfound h1 {
      font-size: clamp(1.4rem, 4vw, 2.1rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
      line-height: 1.15;
    }
    .notfound p {
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.6;
      margin: 0 0 36px;
    }
    .notfound-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <a class="brand" href="index.html">
      <img class="brand-mark" src="assets/brand-avatar.png" alt="">
      <span class="brand-label">
        <strong>Katarina Grande</strong>
        <small>Universe Archive</small>
      </span>
    </a>
    <nav class="topnav" aria-label="Primary">
      <a href="index.html#worlds">Archive</a>
      <a href="index.html#sites">Coded Sites</a>
      <a href="vault.html">Vault</a>
      <a href="about.html">About</a>
    </nav>
  </header>

  <main>
    <div class="notfound">
      <div class="notfound-inner reveal">
        <p class="notfound-code">404</p>
        <p class="notfound-label">World Not Found</p>
        <h1>this world doesn't exist.<br>yet.</h1>
        <p>The page you're looking for must have slipped into another universe. Head back to the archive and find your way home.</p>
        <div class="notfound-actions">
          <a class="btn-primary" href="index.html">Back to the Archive</a>
          <a class="btn-ghost" href="index.html#worlds">Browse worlds</a>
        </div>
      </div>
    </div>
  </main>

  <script src="sparkles.js"></script>
  <script src="transitions.js"></script>
</body>
</html>
